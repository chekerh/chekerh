<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <linearGradient id="wave" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="0" r="1.4" fill="#38bdf8" opacity="0.45"/>
    </pattern>

    <filter id="textShadow">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity="0.9"/>

  <circle cx="1000" cy="80" r="220" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="160" cy="330" r="180" fill="#38bdf8" opacity="0.07"/>

  <path d="M0 115 C170 55 310 175 500 115 C705 45 805 185 1000 110 C1100 72 1165 90 1200 68"
        fill="none" stroke="url(#wave)" stroke-width="12" opacity="0.95">
    <animate attributeName="d"
      dur="5s"
      repeatCount="indefinite"
      values="
      M0 115 C170 55 310 175 500 115 C705 45 805 185 1000 110 C1100 72 1165 90 1200 68;
      M0 130 C180 80 325 145 510 125 C705 70 815 160 1000 125 C1110 92 1160 70 1200 86;
      M0 115 C170 55 310 175 500 115 C705 45 805 185 1000 110 C1100 72 1165 90 1200 68"/>
  </path>

  <path d="M0 138 C170 78 310 198 500 138 C705 68 805 208 1000 133 C1100 95 1165 113 1200 91"
